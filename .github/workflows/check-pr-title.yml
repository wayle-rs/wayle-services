name: Check PR Title

permissions: {}

on:
    pull_request_target:
        types: [opened, reopened, edited, synchronize]

jobs:
    check:
        name: Conventional commit
        runs-on: ubuntu-latest
        steps:
            - uses: amannn/action-semantic-pull-request@v6
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  types: |
                      feat
                      fix
                      docs
                      refactor
                      perf
                      test
                      chore
                      ci
                      build
                  requireScope: false
