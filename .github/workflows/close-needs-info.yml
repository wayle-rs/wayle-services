name: Close stale needs-info issues

on:
    schedule:
        - cron: "0 0 * * *"

jobs:
    close:
        runs-on: ubuntu-latest
        permissions:
            issues: write
        steps:
            - uses: actions/stale@v9
              with:
                  only-labels: "status:needs-info"
                  days-before-stale: -1
                  days-before-close: 14
                  stale-issue-label: "stale"
                  close-issue-message: >
                      Closed after 14 days with no response. Reopen with the requested information
                      any time.
                  exempt-issue-labels: "status:accepted,priority:critical"
                  days-before-pr-stale: -1
                  days-before-pr-close: -1
