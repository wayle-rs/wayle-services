name: Release-plz

permissions: {}

on:
    push:
        branches:
            - master
    workflow_dispatch:

jobs:
    release-plz-release:
        name: Release-plz release
        runs-on: ubuntu-latest
        if: ${{ github.repository_owner == 'wayle-rs' }}
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: false
                  submodules: recursive

            - uses: dtolnay/rust-toolchain@stable

            - uses: release-plz/action@v0.5
              with:
                  command: release
              env:
                  GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

    release-plz-pr:
        name: Release-plz PR
        runs-on: ubuntu-latest
        if: ${{ github.repository_owner == 'wayle-rs' }}
        permissions:
            contents: write
            pull-requests: write
        concurrency:
            group: release-plz-${{ github.ref }}
            cancel-in-progress: false
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  persist-credentials: false
                  submodules: recursive

            - uses: dtolnay/rust-toolchain@stable

            - uses: release-plz/action@v0.5
              with:
                  command: release-pr
              env:
                  GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
                  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
